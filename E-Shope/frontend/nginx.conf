server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache the HTML entry point — chunk filenames change on every build
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        expires off;
    }

    # React Router — serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets for 1 year (safe: filenames change when content changes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Proxy /api/* to backend-service (matches K8s service name; docker-compose uses alias)
    location /api/ {
        proxy_pass http://backend-service:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        client_max_body_size 5m;
    }

    # Proxy /uploads/* to MinIO bucket (docker-compose) — fallback to backend for non-MinIO setups
    # When MinIO is not used, change proxy_pass back to http://backend-service:5000/uploads/
    location /uploads/ {
        proxy_pass http://minio:9000/apnidunia/;
        proxy_set_header Host minio:9000;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Gzip compression
    gzip on;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;
}
