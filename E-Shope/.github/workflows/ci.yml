name: CI — Build & Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend lint + audit ────────────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Check for hardcoded secrets
        run: |
          if grep -rn "apnidunia_secret_2024\|apnidunia_pg_2024" --include="*.js" .; then
            echo "ERROR: Hardcoded default secrets found in source code!"
            exit 1
          fi
          echo "✓ No hardcoded secrets in JS files"

  # ── Frontend build ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true   # warn but don't block on frontend peer-dep issues

  # ── Docker build validation ─────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: e-shope-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: e-shope-frontend:ci
          build-args: |
            VITE_API_URL=/api

  # ── Push to registry on main (optional — needs registry secrets) ────────────
